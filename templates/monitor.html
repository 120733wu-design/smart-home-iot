{% extends "base.html" %}
{% block page_title %}实时监控{% endblock %}
{% block content %}
<!-- 仪表盘卡片区域 一行4列，自动换行 -->
<div class="row mb-3 g-4">
    <!-- 室内温度 -->
    <div class="col-md-3">
        <div class="card shadow-sm rounded-4 h-100">
            <div class="card-header">
                <h6 class="mb-0">
                    <i class="bi bi-thermometer-half me-2 text-danger"></i>温度
                </h6>
            </div>
            <div class="card-body">
                <div id="gauge-temp" class="chart-container-sm" style="height:180px;"></div>
                <div class="text-center mt-2">
                    <span class="badge bg-light text-dark small" id="gauge-temp-time">--</span>
                </div>
            </div>
        </div>
    </div>
    <!-- 室内湿度 -->
    <div class="col-md-3">
        <div class="card shadow-sm rounded-4 h-100">
            <div class="card-header">
                <h6 class="mb-0">
                    <i class="bi bi-droplet-half me-2 text-primary"></i>湿度
                </h6>
            </div>
            <div class="card-body">
                <div id="gauge-humi" class="chart-container-sm" style="height:180px;"></div>
                <div class="text-center mt-2">
                    <span class="badge bg-light text-dark small" id="gauge-humi-time">--</span>
                </div>
            </div>
        </div>
    </div>
    <!-- 室内光照 -->
    <div class="col-md-3">
        <div class="card shadow-sm rounded-4 h-100">
            <div class="card-header">
                <h6 class="mb-0">
                    <i class="bi bi-sun me-2 text-warning"></i>光照
                </h6>
            </div>
            <div class="card-body">
                <div id="gauge-light" class="chart-container-sm" style="height:180px;"></div>
                <div class="text-center mt-2">
                    <span class="badge bg-light text-dark small" id="gauge-light-time">--</span>
                </div>
            </div>
        </div>
    </div>
    <!-- 室外温度 -->
    <div class="col-md-3">
        <div class="card shadow-sm rounded-4 h-100">
            <div class="card-header">
                <h6 class="mb-0">
                    <i class="bi bi-cloud-sun me-2 text-success"></i>室外温度
                </h6>
            </div>
            <div class="card-body">
                <div id="gauge-out-temp" class="chart-container-sm" style="height:180px;"></div>
                <div class="text-center mt-2">
                    <span class="badge bg-light text-dark small" id="gauge-out-temp-time">--</span>
                </div>
            </div>
        </div>
    </div>
    <!-- 室外湿度 自动换行到第二行 -->
    <div class="col-md-3">
        <div class="card shadow-sm rounded-4 h-100">
            <div class="card-header">
                <h6 class="mb-0">
                    <i class="bi bi-cloud-rain me-2 text-orange"></i>室外湿度
                </h6>
            </div>
            <div class="card-body">
                <div id="gauge-out-humi" class="chart-container-sm" style="height:180px;"></div>
                <div class="text-center mt-2">
                    <span class="badge bg-light text-dark small" id="gauge-out-humi-time">--</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 设备选择 + 自动刷新 -->
<div class="row align-items-center mb-3">
    <div class="col-md-6 mb-2">
        <select class="form-select" id="monitor-device-select" aria-label="选择设备">
            <option value="">-- 选择设备 --</option>
        </select>
    </div>
    <div class="col-md-3 ms-auto">
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" id="auto-refresh" checked>
            <label class="form-check-label">自动刷新 (10s)</label>
        </div>
    </div>
</div>

<!-- 实时趋势图表 -->
<div class="card shadow-sm rounded-4">
    <div class="card-header d-flex flex-wrap justify-content-between align-items-center gap-2">
        <h6 class="mb-0">
            <i class="bi bi-graph-up me-2 text-success"></i>实时趋势（最近 1 小时）
        </h6>
        <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-secondary active" data-sensor="temperature">温度</button>
            <button class="btn btn-outline-secondary" data-sensor="humidity">湿度</button>
            <button class="btn btn-outline-secondary" data-sensor="light">光照</button>
        </div>
    </div>
    <div class="card-body">
        <div id="monitor-line-chart" class="chart-container" style="height:320px;"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/monitor.js') }}"></script>
{% endblock %}
