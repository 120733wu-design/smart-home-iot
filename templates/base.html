<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>智能家居监测控制系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
{% if session.user_id %}
<div class="d-flex" id="wrapper">
    <div class="border-end bg-white" id="sidebar-wrapper">
        <div class="sidebar-heading border-bottom py-3 px-3">
            <i class="bi bi-house-heart-fill text-primary me-2"></i>
            <span class="fw-bold">智能家居 IoT</span>
        </div>
        <div class="list-group list-group-flush">
            <a href="/dashboard" class="list-group-item list-group-item-action {{'active' if request.path=='/dashboard' else ''}}">
                <i class="bi bi-speedometer2 me-2"></i>仪表盘
            </a>
            <a href="/devices" class="list-group-item list-group-item-action {{'active' if request.path=='/devices' else ''}}">
                <i class="bi bi-device-hdd me-2"></i>设备管理
            </a>
            <a href="/monitor" class="list-group-item list-group-item-action {{'active' if request.path=='/monitor' else ''}}">
                <i class="bi bi-activity me-2"></i>实时监控
            </a>
            <a href="/history" class="list-group-item list-group-item-action {{'active' if request.path=='/history' else ''}}">
                <i class="bi bi-graph-up me-2"></i>历史曲线
            </a>
            <!-- 新增阈值配置菜单 -->
            <a href="{{ url_for('threshold.index') }}" class="list-group-item list-group-item-action {{'active' if request.endpoint == 'threshold.index' else ''}}">
                <i class="bi bi-sliders me-2"></i>阈值配置
            </a>
            <a href="/alerts" class="list-group-item list-group-item-action {{'active' if request.path=='/alerts' else ''}}">
                <i class="bi bi-exclamation-triangle me-2"></i>告警管理
            </a>
            <a href="/prediction" class="list-group-item list-group-item-action {{'active' if request.path=='/prediction' else ''}}">
                <i class="bi bi-cpu me-2"></i>智能预测
            </a>
        </div>
    </div>

    <div id="page-content-wrapper">
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-2 px-4">
            <div class="container-fluid">
                <button class="btn btn-sm btn-outline-secondary" id="menu-toggle" title="切换侧边栏" aria-label="切换侧边栏">
                    <i class="bi bi-list"></i>
                </button>
                <span class="ms-3 text-muted small" id="page-title">
                    {% block page_title %}首页{% endblock page_title %}
                </span>
                <div class="ms-auto d-flex align-items-center">
                    <span class="badge bg-danger me-3" id="alert-badge" style="display:none;">0</span>
                    <div class="dropdown">
                        <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>{{ session.username }}
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <button class="dropdown-item" id="btn-logout">
                                    <i class="bi bi-box-arrow-right me-2"></i>退出登录
                                </button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
        <div class="container-fluid p-4">
            {% block content %}{% endblock content %}
        </div>
    </div>
</div>
{% else %}
<div class="container">
    {% block auth_content %}{% endblock auth_content %}
</div>
{% endif %}

<script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock scripts %}
</body>
</html>
