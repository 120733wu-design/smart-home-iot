{% extends "base.html" %}
{% block auth_content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4 p-lg-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill text-primary" style="font-size:2.8rem;"></i>
                    <h4 class="mt-3 mb-1">创建账户</h4>
                    <p class="text-muted small">注册智能家居系统管理账户</p>
                </div>

                <div id="register-error" class="alert alert-danger d-none small"></div>

                <form id="register-form">
                    <div class="mb-3">
                        <label class="form-label small">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" class="form-control form-control-sm" id="reg-username" placeholder="3-50个字符" required minlength="3">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small">密码</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control form-control-sm" id="reg-password" placeholder="至少6位密码" required minlength="6">
                            <button class="btn btn-outline-secondary btn-sm" type="button" id="toggle-pwd1">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small">确认密码</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input type="password" class="form-control form-control-sm" id="reg-confirm" placeholder="再次输入密码" required>
                            <button class="btn btn-outline-secondary btn-sm" type="button" id="toggle-pwd2">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2" id="reg-submit">
                        注 册
                    </button>
                </form>

                <div class="text-center mt-4">
                    <small class="text-muted">已有账户？
                        <a href="/login" class="text-primary text-decoration-none fw-medium">立即登录</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 密码显示切换
const pwd1 = document.getElementById('reg-password');
const toggle1 = document.getElementById('toggle-pwd1');
toggle1.addEventListener('click', function () {
    const icon = this.querySelector('i');
    if (pwd1.type === 'password') {
        pwd1.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        pwd1.type = 'password';
        icon.className = 'bi bi-eye';
    }
});

const pwd2 = document.getElementById('reg-confirm');
const toggle2 = document.getElementById('toggle-pwd2');
toggle2.addEventListener('click', function () {
    const icon = this.querySelector('i');
    if (pwd2.type === 'password') {
        pwd2.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        pwd2.type = 'password';
        icon.className = 'bi bi-eye';
    }
});

// 注册提交逻辑
document.getElementById('register-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const errorBox = document.getElementById('register-error');
    const submitBtn = document.getElementById('reg-submit');
    errorBox.classList.add('d-none');

    // 去除首尾空格
    const username = document.getElementById('reg-username').value.trim();
    const password = document.getElementById('reg-password').value.trim();
    const confirmPwd = document.getElementById('reg-confirm').value.trim();

    // 前端校验
    if (!username || !password || !confirmPwd) {
        errorBox.textContent = '用户名、密码、确认密码不能为空';
        errorBox.classList.remove('d-none');
        return;
    }
    if (password !== confirmPwd) {
        errorBox.textContent = '两次输入的密码不一致';
        errorBox.classList.remove('d-none');
        return;
    }

    // 按钮加载状态，防止重复提交
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>注册中...';

    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
            const doFace = confirm('注册成功！是否立即录入人脸以便后续使用人脸登录？\n（可稍后在右上角菜单"人脸录入"中补录）');
            if (doFace) { window.location.href = '/face-setup'; }
            else { window.location.href = '/dashboard'; }
        } else {
            errorBox.textContent = data.message || '注册失败';
            errorBox.classList.remove('d-none');
        }
    } catch (err) {
        errorBox.textContent = '网络连接失败，请检查服务';
        errorBox.classList.remove('d-none');
    } finally {
        // 恢复按钮
        submitBtn.disabled = false;
        submitBtn.innerHTML = '注 册';
    }
});
</script>
{% endblock %}
