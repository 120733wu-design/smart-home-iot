{% extends "base.html" %}
{% block page_title %}控制面板{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h5 class="mb-1" style="font-weight:600">数据总览</h5>
        <small class="text-muted">系统实时状态与设备统计</small>
    </div>
    <span class="badge bg-light text-muted px-3 py-2" id="dashboard-refresh-time">
        <i class="bi bi-arrow-repeat me-1"></i>自动刷新时间
    </span>
</div>

<div class="row g-3 mb-4">
    <div class="col-md-3">
        <div class="card stat-card card-gradient-primary">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-1" style="opacity:.7;font-size:.75rem;letter-spacing:.5px">设备总数</h6>
                        <h2 class="mb-0 fw-bold" id="stat-total-devices" style="font-size:1.8rem">--</h2>
                    </div>
                    <i class="bi bi-device-hdd" style="font-size:2rem;opacity:.15"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card card-gradient-success">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-1" style="opacity:.7;font-size:.75rem;letter-spacing:.5px">在线设备</h6>
                        <h2 class="mb-0 fw-bold" id="stat-online-devices" style="font-size:1.8rem">--</h2>
                    </div>
                    <i class="bi bi-wifi" style="font-size:2rem;opacity:.15"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card card-gradient-warning">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-1" style="opacity:.7;font-size:.75rem;letter-spacing:.5px">在线率</h6>
                        <h2 class="mb-0 fw-bold" id="stat-online-rate" style="font-size:1.8rem">--%</h2>
                    </div>
                    <i class="bi bi-graph-up-arrow" style="font-size:2rem;opacity:.15"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card card-gradient-danger">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-1" style="opacity:.7;font-size:.75rem;letter-spacing:.5px">未读告警</h6>
                        <h2 class="mb-0 fw-bold" id="stat-unread-alerts" style="font-size:1.8rem">--</h2>
                    </div>
                    <i class="bi bi-exclamation-triangle" style="font-size:2rem;opacity:.15"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row g-3 mb-4">
    <div class="col-md-8">
        <div class="card h-100">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0">
                    <i class="bi bi-activity me-2 text-primary"></i>温湿度实时曲线
                </h6>
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-secondary active" style="font-size:.75rem" onclick="dashboardChartSwitch('all', event)">全部</button>
                    <button class="btn btn-outline-secondary" style="font-size:.75rem" onclick="dashboardChartSwitch('temp', event)">温度</button>
                    <button class="btn btn-outline-secondary" style="font-size:.75rem" onclick="dashboardChartSwitch('humi', event)">湿度</button>
                </div>
            </div>
            <div class="card-body">
                <div id="dashboard-real-chart" class="chart-container"></div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card h-100">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0">
                    <i class="bi bi-bell me-2 text-danger"></i>最近告警
                </h6>
                <a href="/alerts" class="btn btn-sm btn-outline-secondary" style="font-size:.75rem">查看全部</a>
            </div>
            <div class="card-body p-3" id="recent-alerts-list" style="max-height:360px;overflow-y:auto">
                <div class="text-center text-muted py-5">
                    <div class="loading-spinner mb-2"></div>
                    <small>加载中...</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% endblock %}
