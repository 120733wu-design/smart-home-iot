{% extends "base.html" %}
{% block page_title %}远程控制{% endblock page_title %}
{% block content %}
<div class="row mb-3">
    <div class="col-12">
        <h4 class="fw-bold"><i class="bi bi-sliders2-vertical me-2 text-primary"></i>远程设备控制</h4>
        <p class="text-muted small mb-0">通过 MQTT 协议远程控制 ESP8266 终端的继电器开关，支持实时状态反馈</p>
    </div>
</div>

<!-- MQTT 状态指示 -->
<div class="row mb-3">
    <div class="col-12">
        <div class="card border-0 shadow-sm">
            <div class="card-body py-2 d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <span class="me-3 fw-bold text-secondary">MQTT 服务状态：</span>
                    <span id="mqtt-indicator" class="badge bg-secondary">
                        <i class="bi bi-question-circle me-1"></i>检测中...
                    </span>
                    <span id="mqtt-broker" class="ms-2 text-muted small"></span>
                </div>
                <div>
                    <span class="text-muted small me-2">已发命令：</span>
                    <span class="badge bg-info" id="cmd-total">0</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 设备控制卡片区 -->
<div class="row" id="device-cards">
    <div class="col-12 text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">加载中...</span>
        </div>
        <p class="text-muted mt-2">正在加载设备列表...</p>
    </div>
</div>

<!-- 控制命令历史 -->
<div class="row mt-4">
    <div class="col-12">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                <h6 class="mb-0 fw-bold"><i class="bi bi-clock-history me-2 text-info"></i>命令下发记录</h6>
                <button class="btn btn-sm btn-outline-secondary" id="btn-refresh-history" title="刷新">
                    <i class="bi bi-arrow-clockwise"></i> 刷新
                </button>
            </div>
            <div class="card-body p-0" style="max-height: 400px; overflow-y: auto;">
                <table class="table table-hover mb-0">
                    <thead class="table-light sticky-top">
                        <tr>
                            <th>时间</th>
                            <th>设备</th>
                            <th>命令</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="cmd-history-body">
                        <tr>
                            <td colspan="4" class="text-center text-muted py-4">
                                <i class="bi bi-inbox display-6 d-block mb-2"></i>暂无命令记录
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/control.js') }}"></script>
{% endblock scripts %}
