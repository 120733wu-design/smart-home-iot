{% extends "base.html" %}
{% block page_title %}设备管理{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h6 class="mb-0"><i class="bi bi-device-hdd me-2 text-primary"></i>设备列表</h6>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#deviceModal">
            <i class="bi bi-plus-lg me-1"></i>创建设备
        </button>
    </div>
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-4">
                <input type="text" class="form-control form-control-sm" id="search-device" placeholder="搜索设备名称/设备Key..." aria-label="搜索设备">
            </div>
            <div class="col-md-3">
                <select class="form-select form-select-sm" id="filter-status" aria-label="按状态筛选">
                    <option value="">全部状态</option>
                    <option value="online">在线</option>
                    <option value="offline">离线</option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select form-select-sm" id="filter-type" aria-label="按类型筛选">
                    <option value="">全部类型</option>
                    <option value="sensor">传感器</option>
                    <option value="actuator">执行器</option>
                    <option value="hybrid">混合设备</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-outline-secondary btn-sm w-100" id="btn-refresh-devices">
                    <i class="bi bi-arrow-clockwise"></i> 刷新
                </button>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>名称</th>
                        <th>设备Key</th>
                        <th>类型</th>
                        <th>位置</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="devices-table-body">
                    <tr>
                        <td colspan="8" class="text-center text-muted py-4">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="deviceModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deviceModalLabel">创建设备</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-device-id">
                <div class="mb-3">
                    <label class="form-label">设备名称</label>
                    <input type="text" class="form-control" id="edit-name" placeholder="例如：客厅传感器">
                </div>
                <div class="mb-3">
                    <label class="form-label">设备Key</label>
                    <input type="text" class="form-control" id="edit-key" placeholder="例如：esp8266-001">
                </div>
                <div class="mb-3">
                    <label class="form-label">设备类型</label>
                    <select class="form-select" id="edit-type">
                        <option value="sensor">传感器</option>
                        <option value="actuator">执行器</option>
                        <option value="hybrid">混合设备</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">位置</label>
                    <input type="text" class="form-control" id="edit-location" placeholder="例如：客厅">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="btn-save-device">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/devices.js') }}"></script>
{% endblock %}
